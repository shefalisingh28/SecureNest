plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // <--- ADD THIS LINE
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// --- SECURENEST: LOAD .env FILE START ---
def envFile = rootProject.file('../.env')
def envVars = new Properties()
if (envFile.exists()) {
    envFile.withReader('UTF-8') { reader ->
        envVars.load(reader)
    }
}
// --- SECURENEST: LOAD .env FILE END ---

android {
    namespace "com.securenest.app"  // CHANGED: Matches your new package name
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

 defaultConfig {
        applicationId "com.securenest.app"

        minSdkVersion 23
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // --- SECURENEST: PASS API KEY & APP NAME TO MANIFEST ---
        manifestPlaceholders = [
            MAPS_API_KEY   : envVars.getProperty("MAPS_API_KEY") ?: "KEY_NOT_FOUND",
            applicationName: "android.app.Application" 
        ]
    }
    
    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
